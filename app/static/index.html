<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM Chatbot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <section class="chat-panel" aria-label="Chat">
      <header class="topbar">
        <div>
          <p class="eyebrow">LLM Chatbot</p>
          <h1>Ask anything</h1>
        </div>
        <button id="clearChat" class="icon-button" type="button" title="Clear chat" aria-label="Clear chat">
          <span aria-hidden="true">×</span>
        </button>
      </header>

      <div id="messages" class="messages" aria-live="polite">
        <article class="message bot">
          <div class="bubble">Hi. Send a prompt and I will reply here.</div>
        </article>
      </div>

      <form id="chatForm" class="composer">
        <label class="sr-only" for="prompt">Message</label>
        <textarea id="prompt" name="prompt" rows="1" placeholder="Type your message..." required></textarea>
        <button id="sendButton" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
